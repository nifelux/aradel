<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aradel — Withdrawal History</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <style>
    .dep-status { padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; }
    .s-pending { background:var(--warn-bg); color:var(--warn); }
    .s-approved { background:var(--success-bg); color:var(--success); }
    .s-rejected { background:var(--danger-bg); color:var(--danger); }
  </style>
</head>
<body data-supabase-url="YOUR_SUPABASE_URL" data-supabase-anon="YOUR_SUPABASE_ANON_KEY">
<div class="page-wrap">
  <div class="topbar"><a class="back-btn" href="profile.html">‹</a><span class="topbar-title">📤 Withdrawal History</span></div>
  <div class="card" style="margin:16px;overflow:hidden" id="histList"><div class="loader-wrap"><div class="loader"></div></div></div>
</div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/js/supabase.js" defer></script>
<script src="assets/js/auth.js" defer></script>
<script>
(function(){
  function waitSb(cb){if(window.sb&&window.AradelAuth){cb();return;}var t=setInterval(function(){if(window.sb&&window.AradelAuth){clearInterval(t);cb();}},50);}
  waitSb(async function(){
    var s=await window.AradelAuth.requireAuth(); if(!s)return;
    var r=await fetch("/api/withdraw?user_id="+s.user.id); var d=await r.json(); var ws=d.withdrawals||[];
    var el=document.getElementById("histList");
    if(!ws.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📤</div><p>No withdrawals yet.</p></div>'; return; }
    el.innerHTML=ws.map(function(w){
      var sc="s-"+(w.status||"pending");
      return '<div class="list-item"><div><div class="li-title">'+w.bank_name+' <span class="dep-status '+sc+'">'+w.status+'</span></div><div class="li-sub">'+w.account_number+' · '+w.account_name+'</div><div class="li-sub">'+new Date(w.created_at).toLocaleString()+'</div></div><div class="li-amount debit">-'+window.AradelAuth.money(w.amount)+'</div></div>';
    }).join("");
  });
})();
</script>
</body>
</html>
