<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aradel — Change Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body data-supabase-url="YOUR_SUPABASE_URL" data-supabase-anon="YOUR_SUPABASE_ANON_KEY">
<div class="page-wrap">
  <div class="topbar"><a class="back-btn" href="profile.html">‹</a><span class="topbar-title">🔐 Change Password</span></div>
  <div class="section">
    <div class="card card-pad">
      <div id="alertBox" style="display:none" class="alert"></div>
      <div class="field"><label class="field-label">Current Password</label><input class="field-input" type="password" id="currentPw"/></div>
      <div class="field"><label class="field-label">New Password</label><input class="field-input" type="password" id="newPw" placeholder="Min. 8 characters"/></div>
      <div class="field"><label class="field-label">Confirm New Password</label><input class="field-input" type="password" id="confirmPw"/></div>
      <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/js/supabase.js" defer></script>
<script src="assets/js/auth.js" defer></script>
<script>
(function(){
  function waitSb(cb){if(window.sb&&window.AradelAuth){cb();return;}var t=setInterval(function(){if(window.sb&&window.AradelAuth){clearInterval(t);cb();}},50);}
  waitSb(async function(){ await window.AradelAuth.requireAuth(); });
  window.changePassword=async function(){
    var current=document.getElementById("currentPw").value, newPw=document.getElementById("newPw").value, confirm=document.getElementById("confirmPw").value;
    var al=document.getElementById("alertBox"); al.style.display="none";
    if(!current||!newPw||!confirm){ al.textContent="Please fill in all fields."; al.className="alert alert-error show"; al.style.display="block"; return; }
    if(newPw.length<8){ al.textContent="New password must be at least 8 characters."; al.className="alert alert-error show"; al.style.display="block"; return; }
    if(newPw!==confirm){ al.textContent="New passwords do not match."; al.className="alert alert-error show"; al.style.display="block"; return; }
    var {data:s}=await window.sb.auth.getSession(); var email=s?.session?.user?.email;
    var {error:loginErr}=await window.sb.auth.signInWithPassword({email,password:current});
    if(loginErr){ al.textContent="Current password is incorrect."; al.className="alert alert-error show"; al.style.display="block"; return; }
    var {error:updateErr}=await window.sb.auth.updateUser({password:newPw});
    if(updateErr){ al.textContent=updateErr.message; al.className="alert alert-error show"; al.style.display="block"; return; }
    al.textContent="✅ Password updated successfully!"; al.className="alert alert-success show"; al.style.display="block";
  };
})();
</script>
</body>
</html>
