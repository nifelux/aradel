<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aradel — Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <style>
    .notif-item { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--paper); display:flex; gap:12px; align-items:flex-start; }
    .notif-item.unread { border-left:3px solid var(--red); background:#FDF9F8; }
    .notif-icon { width:38px; height:38px; border-radius:10px; background:var(--red-tint); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .notif-title { font-size:14px; font-weight:700; color:var(--ink); }
    .notif-msg { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4; }
    .notif-time { font-size:11px; color:var(--muted); margin-top:4px; }
  </style>
</head>
<body data-supabase-url="YOUR_SUPABASE_URL" data-supabase-anon="YOUR_SUPABASE_ANON_KEY">
<div class="page-wrap">
  <div class="topbar"><a class="back-btn" href="dashboard.html">‹</a><span class="topbar-title">🔔 Notifications</span><button onclick="markAll()" style="background:none;border:none;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;margin-left:auto">Clear All</button></div>
  <div class="card" style="margin:16px;overflow:hidden" id="notifList"><div class="loader-wrap"><div class="loader"></div></div></div>
</div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/js/supabase.js" defer></script>
<script src="assets/js/auth.js" defer></script>
<script>
(function(){
  var uid="";
  function waitSb(cb){if(window.sb&&window.AradelAuth){cb();return;}var t=setInterval(function(){if(window.sb&&window.AradelAuth){clearInterval(t);cb();}},50);}
  waitSb(async function(){ var s=await window.AradelAuth.requireAuth(); if(!s)return; uid=s.user.id; await load(); });
  async function load(){
    var {data}=await window.sb.from("notifications").select("*").eq("user_id",uid).order("created_at",{ascending:false}).limit(50);
    var el=document.getElementById("notifList");
    if(!data||!data.length){ el.innerHTML='<div class="empty"><div class="empty-icon">🔔</div><p>No notifications yet.</p></div>'; return; }
    el.innerHTML=data.map(function(n){ return '<div class="notif-item'+(n.is_read?"":" unread")+'"><div class="notif-icon">🔔</div><div><div class="notif-title">'+n.title+'</div><div class="notif-msg">'+n.message+'</div><div class="notif-time">'+window.AradelAuth.timeAgo(n.created_at)+'</div></div></div>'; }).join("");
    await window.sb.from("notifications").update({is_read:true}).eq("user_id",uid).eq("is_read",false);
  }
  window.markAll=async function(){ await window.sb.from("notifications").delete().eq("user_id",uid); window.AradelAuth.toast("Notifications cleared"); document.getElementById("notifList").innerHTML='<div class="empty"><div class="empty-icon">🔔</div><p>No notifications yet.</p></div>'; };
})();
</script>
</body>
</html>
