<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aradel — Withdraw</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <style>
    .bal-card { background:linear-gradient(155deg,var(--red),var(--red-dark)); border-radius:20px; margin:16px; padding:22px; color:#fff; text-align:center; }
    .bal-label { font-size:12px; opacity:.85; text-transform:uppercase; letter-spacing:.08em; }
    .bal-amount { font-family:'Fraunces',serif; font-size:34px; font-weight:600; margin:6px 0; }
    .min-note { font-size:12px; opacity:.8; }
    .saved-card { background:var(--paper); border-radius:12px; padding:12px 14px; border:2px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer; margin-bottom:8px; transition:border-color .15s; }
    .saved-card.selected { border-color:var(--red); background:var(--red-tint); }
    .saved-card-icon { width:36px; height:36px; border-radius:8px; background:var(--red-tint); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .saved-card-name { font-size:13px; font-weight:700; color:var(--ink); }
    .saved-card-num { font-size:11px; color:var(--muted); margin-top:1px; }
  </style>
</head>
<body data-supabase-url="YOUR_SUPABASE_URL" data-supabase-anon="YOUR_SUPABASE_ANON_KEY">
<div class="page-wrap">
  <div class="topbar"><a class="back-btn" href="dashboard.html">‹</a><span class="topbar-title">💸 Withdraw</span></div>
  <div class="bal-card"><div class="bal-label">Available Balance</div><div class="bal-amount" id="balance">₦0.00</div><div class="min-note" id="limitsNote">Loading limits…</div></div>

  <div class="section">
    <div id="alert" class="alert"></div>
    <div id="lockedBanner" style="display:none;background:var(--danger-bg);border-radius:12px;padding:14px 16px;margin-bottom:16px;text-align:center">
      <div style="font-size:14px;font-weight:700;color:var(--danger)">🔒 Withdrawals are temporarily paused</div>
      <div style="font-size:12px;color:var(--danger);margin-top:4px">Please check back later, or contact customer service.</div>
    </div>

    <div class="field"><label class="field-label">Amount (₦)</label><input class="field-input" type="number" id="amount" placeholder="Enter amount to withdraw" min="1000"/></div>

    <div class="field">
      <label class="field-label">Select Bank Account</label>
      <div id="savedCards"></div>
      <button onclick="toggleManual()" style="font-size:13px;color:var(--red);font-weight:600;background:none;border:none;cursor:pointer;padding:4px 0;margin-top:4px">+ Enter manually</button>
    </div>

    <div id="manualFields" style="display:none">
      <div class="field"><label class="field-label">Bank Name</label><input class="field-input" id="bankName" placeholder="e.g. Opay, GTBank, Access"/></div>
      <div class="field"><label class="field-label">Account Number</label><input class="field-input" id="acctNum" placeholder="0000000000" type="tel" maxlength="10"/></div>
      <div class="field"><label class="field-label">Account Name</label><input class="field-input" id="acctName" placeholder="Full account name"/></div>
    </div>

    <button class="btn btn-primary" id="withdrawBtn" onclick="doWithdraw()">Request Withdrawal</button>
  </div>
</div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/js/supabase.js" defer></script>
<script src="assets/js/auth.js" defer></script>
<script>
(function(){
  var uid="",balance=0,selectedCard=null,showManual=false,minW=1000,maxW=0;
  function waitSb(cb){if(window.sb&&window.AradelAuth){cb();return;}var t=setInterval(function(){if(window.sb&&window.AradelAuth){clearInterval(t);cb();}},50);}

  waitSb(async function(){
    var s=await window.AradelAuth.requireAuth(); if(!s)return;
    uid=s.user.id;

    try{
      var lockRes=await fetch("/api/withdraw?action=lock-status");
      var lockData=await lockRes.json();
      if(lockData.locked){
        document.getElementById("lockedBanner").style.display="block";
        document.getElementById("withdrawBtn").disabled=true;
        document.getElementById("withdrawBtn").textContent="Withdrawals Paused";
      }
    }catch(e){}

    try{
      var limRes=await fetch("/api/withdraw?action=limits");
      var limData=await limRes.json();
      minW=limData.min||1000; maxW=limData.max||0;
      document.getElementById("limitsNote").textContent = maxW>0 ? "Min: ₦"+minW.toLocaleString()+" · Max: ₦"+maxW.toLocaleString() : "Minimum withdrawal: ₦"+minW.toLocaleString();
    }catch(e){}

    var {data:w}=await window.sb.from("wallets").select("balance").eq("user_id",uid).single();
    balance=w?.balance||0;
    document.getElementById("balance").textContent=window.AradelAuth.money(balance);

    var r=await fetch("/api/user?action=bank-cards&user_id="+uid);
    var d=await r.json();
    var cards=d.cards||[];
    var wrap=document.getElementById("savedCards");
    if(!cards.length){ wrap.innerHTML='<div style="font-size:13px;color:var(--muted)">No saved accounts.</div>'; toggleManual(); }
    else {
      wrap.innerHTML=cards.map(function(c){
        return '<div class="saved-card" id="sc-'+c.id+'" onclick="selectCard(\''+c.id+'\',\''+c.bank_name+'\',\''+c.account_number+'\',\''+c.account_name+'\')"><div class="saved-card-icon">💳</div><div><div class="saved-card-name">'+c.bank_name+'</div><div class="saved-card-num">'+c.account_number+' · '+c.account_name+'</div></div>'+(c.is_default?'<span class="pill pill-red" style="margin-left:auto;font-size:10px">Default</span>':'')+'</div>';
      }).join("");
      var def=cards.find(function(c){return c.is_default;})||cards[0];
      if(def) selectCard(def.id,def.bank_name,def.account_number,def.account_name);
    }
  });

  window.selectCard=function(id,bank,num,name){
    document.querySelectorAll(".saved-card").forEach(function(c){c.classList.remove("selected");});
    var el=document.getElementById("sc-"+id); if(el) el.classList.add("selected");
    selectedCard={bank_name:bank,account_number:num,account_name:name};
    showManual=false; document.getElementById("manualFields").style.display="none";
  };
  window.toggleManual=function(){
    showManual=!showManual;
    document.getElementById("manualFields").style.display=showManual?"block":"none";
    if(showManual) selectedCard=null;
  };

  window.doWithdraw=async function(){
    var btn=document.getElementById("withdrawBtn"); var al=document.getElementById("alert");
    var amt=Number(document.getElementById("amount").value);
    al.className="alert";
    if(!amt||amt<minW){ al.textContent="Minimum withdrawal is ₦"+minW.toLocaleString(); al.className="alert alert-error show"; return; }
    if(maxW>0 && amt>maxW){ al.textContent="Maximum withdrawal is ₦"+maxW.toLocaleString(); al.className="alert alert-error show"; return; }
    if(amt>balance){ al.textContent="Insufficient balance"; al.className="alert alert-error show"; return; }

    var bank=selectedCard?.bank_name||document.getElementById("bankName")?.value?.trim();
    var num=selectedCard?.account_number||document.getElementById("acctNum")?.value?.trim();
    var name=selectedCard?.account_name||document.getElementById("acctName")?.value?.trim();
    if(!bank||!num||!name){ al.textContent="Please provide bank account details"; al.className="alert alert-error show"; return; }

    btn.disabled=true; btn.textContent="Processing…";
    var r=await fetch("/api/withdraw",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:uid,amount:amt,bank_name:bank,account_number:num,account_name:name})});
    var d=await r.json();
    if(d.ok){
      al.textContent="✅ Withdrawal request submitted! We'll process it within 24 hours.";
      al.className="alert alert-success show"; btn.textContent="Submitted ✓";
      balance-=amt; document.getElementById("balance").textContent=window.AradelAuth.money(balance);
    } else {
      al.textContent=d.error||"Error processing request"; al.className="alert alert-error show";
      btn.disabled=false; btn.textContent="Request Withdrawal";
    }
  };
})();
</script>
</body>
</html>
