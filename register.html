<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aradel — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#fff;min-height:100vh}
    .wrap{max-width:440px;margin:0 auto;min-height:100vh}
    .hero{background:linear-gradient(155deg,#B91C3C 0%,#7F1228 100%);padding:44px 32px 36px;text-align:center;color:#fff;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:rgba(255,255,255,.07);border-radius:50%}
    .seal-big{width:52px;height:52px;border-radius:50%;background:#fff;color:#B91C3C;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin:0 auto 10px;position:relative;z-index:1;border:3px solid rgba(255,255,255,.5)}
    .logo{font-family:'Fraunces',serif;font-size:26px;font-weight:600;position:relative;z-index:1}
    .logo-sub{font-size:12px;opacity:.85;margin-top:4px;position:relative;z-index:1}
    .body{padding:24px 22px 60px}
    .title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:#1A1611;margin-bottom:4px}
    .sub{font-size:14px;color:#8A7F78;margin-bottom:22px}
    .ref-box{background:#FBE9EC;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#B91C3C;font-weight:600}
    .alert-box{padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:14px}
    .a-error{background:#FEE2E2;color:#991B1B} .a-success{background:#E3F5EC;color:#0F7B4E}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:13px;font-weight:600;color:#1A1611;margin-bottom:5px}
    .field input{width:100%;padding:13px 16px;border:2px solid #EAE3DF;border-radius:10px;font-size:15px;color:#1A1611;background:#fff;outline:none;font-family:inherit}
    .field input:focus{border-color:#B91C3C}
    .btn{width:100%;padding:15px;border:none;border-radius:50px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;background:#B91C3C;color:#fff;transition:opacity .15s;margin-top:4px}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .switch{text-align:center;font-size:14px;color:#8A7F78;margin-top:18px}
    .switch a{color:#B91C3C;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="seal-big">A</div>
    <div class="logo">Aradel</div>
    <div class="logo-sub">Start your investment journey</div>
  </div>
  <div class="body">
    <div class="title">Create Account</div>
    <div class="sub">Join Aradel and start earning daily</div>
    <div id="refBox" class="ref-box" style="display:none">🎉 Referred by: <span id="refName">a friend</span></div>
    <div id="alertBox" class="alert-box" style="display:none"></div>
    <div class="field"><label>Full Name</label><input type="text" id="fullName" placeholder="Your full name" autocomplete="name"/></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Phone Number</label><input type="tel" id="phone" placeholder="080XXXXXXXX"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Min. 6 characters"/></div>
    <div class="field"><label>Referral Code <span style="color:#8A7F78;font-weight:400">(optional)</span></label><input type="text" id="refCode" placeholder="ENTER CODE" style="text-transform:uppercase;letter-spacing:.06em"/></div>
    <button class="btn" id="regBtn">Create Account</button>
    <div class="switch">Already have an account? <a href="index.html">Sign in</a></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>
(function(){
  function cleanMsg(msg){
    if(!msg) return null;
    var s=String(msg).trim();
    if(s==="{}"||s==="[]"||s==="[object Object]"||s==="undefined") return null;
    try { var p=JSON.parse(s); if(p&&p.message) return p.message; } catch(e){}
    return s;
  }
  function showAlert(msg,type){
    var el=document.getElementById("alertBox");
    var clean=cleanMsg(msg)||(type==="success"?"Success!":"Something went wrong. Please check your setup and try again.");
    el.textContent=clean; el.className="alert-box "+(type==="success"?"a-success":"a-error"); el.style.display="block";
  }

  var urlRef=new URLSearchParams(location.search).get("ref");
  if(urlRef){ document.getElementById("refCode").value=urlRef.toUpperCase(); document.getElementById("refBox").style.display="block"; }
  document.getElementById("refCode").addEventListener("input", function(){ this.value=this.value.toUpperCase(); });

  document.getElementById("regBtn").addEventListener("click", async function(){
    var btn=this;
    var name=document.getElementById("fullName").value.trim();
    var email=document.getElementById("email").value.trim();
    var phone=document.getElementById("phone").value.trim();
    var pass=document.getElementById("password").value;
    var ref=document.getElementById("refCode").value.trim().toUpperCase();
    document.getElementById("alertBox").style.display="none";

    if(!name||!email||!phone||!pass){ showAlert("Please fill in all required fields.","error"); return; }
    if(pass.length<6){ showAlert("Password must be at least 6 characters.","error"); return; }
    if(!window.sb){ showAlert("Connection error. Please refresh and try again.","error"); return; }

    btn.disabled=true; btn.textContent="Creating account…";

    try {
      if(ref){
        var {data:refProfile}=await window.sb.from("profiles").select("id,full_name").eq("referral_code",ref).single();
        if(refProfile){ document.getElementById("refName").textContent=refProfile.full_name||"a friend"; document.getElementById("refBox").style.display="block"; }
      }

      // full_name/phone/referral_code passed as signup metadata — the
      // server-side trigger reads this, avoiding the RLS-blocks-anonymous-
      // write problem that happens with a separate post-signup client call.
      var {data,error}=await window.sb.auth.signUp({
        email, password:pass,
        options: { data: { full_name:name, phone:phone, referral_code: ref||null } }
      });

      if(error){ showAlert(error.message||"Registration failed. Try again.","error"); btn.disabled=false; btn.textContent="Create Account"; return; }

      if(!data?.session){
        showAlert("✅ Account created! Check your email for a confirmation link, then sign in.","success");
        btn.disabled=false; btn.textContent="Create Account"; return;
      }

      showAlert("✅ Account created! Signing you in…","success");
      var {error:loginErr}=await window.sb.auth.signInWithPassword({email,password:pass});
      if(loginErr){ showAlert("Account created! Please sign in manually.","success"); setTimeout(function(){location.href="/index.html";},1500); return; }
      setTimeout(function(){ location.href="/dashboard.html"; }, 1000);

    } catch(e){
      console.error("Registration error:", e);
      showAlert(cleanMsg(e?.message)||"Registration failed. Please check your Supabase setup and try again.","error");
      btn.disabled=false; btn.textContent="Create Account";
    }
  });
})();
</script>
</body>
</html>
